<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>互動版：PCCS 24色相環 - 水彩混色教學網</title>
  <style>
    :root {
      --bg-color: #f4f7f6;
      --panel-bg: #ffffff;
      --text-color: #333333;
      --accent-color: #4a90e2;
    }
    body {
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      max-width: 1100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    h1 { margin: 0; font-size: 24px; color: #2c3e50; }
    .nav-btn {
      background: var(--accent-color);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      white-space: nowrap;
    }
    .nav-btn:hover { background: #357abd; }
    
    .container {
      display: flex;
      flex-direction: row;
      width: 100%;
      max-width: 1100px;
      background: var(--panel-bg);
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      overflow: hidden;
      min-height: 550px;
    }
    
    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      border-right: 2px dashed #eeeeee;
      position: relative;
    }
    
    #wheel-wrapper {
      transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }
    #wheel-canvas {
      cursor: crosshair;
      max-width: 100%;
      height: auto;
      touch-action: manipulation;
    }
    .spinning {
      transform: rotate(720deg);
    }
    
    .right-panel {
      flex: 1;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    
    .selection-board {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid #e0e0e0;
    }
    .selection-title {
      font-weight: bold;
      margin-bottom: 15px;
      color: #2c3e50;
      text-align: center;
    }
    .selected-colors-container {
      display: flex;
      justify-content: space-around;
      align-items: center;
    }
    .color-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .color-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px dashed #ccc;
      background-color: transparent;
      margin-bottom: 8px;
      transition: all 0.3s;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
    }
    .color-circle.filled {
      border: 3px solid #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .plus-sign {
      font-size: 24px;
      color: #999;
      font-weight: bold;
    }

    .option-group { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; }
    select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 16px;
      background-color: #fafafa;
    }
    
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .mix-btn {
      flex: 2;
      background: #e67e22;
      color: white;
      border: none;
      padding: 15px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }
    .mix-btn:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
    }
    .mix-btn:not(:disabled):hover { background: #d35400; }
    
    .reset-btn {
      flex: 1;
      background: #95a5a6;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }
    .reset-btn:hover { background: #7f8c8d; }

    #result-box {
      margin-top: 25px;
      padding: 15px;
      border-radius: 10px;
      background: #ebf5fb;
      text-align: center;
      display: none;
      border: 1px solid #d6eaf8;
    }
    #result-swatch {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin: 10px auto;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.15);
      border: 4px solid white;
    }
    
    /* 進階相機區 */
    #advanced-view { display: none; width: 100%; padding: 30px; flex-direction: column; align-items: center; box-sizing: border-box; }
    .camera-container { position: relative; max-width: 600px; width: 100%; border: 2px dashed #ccc; border-radius: 10px; overflow: hidden; text-align: center; background: #000; }
    #video-feed, #photo-canvas { width: 100%; height: auto; display: block; }
    #photo-canvas { cursor: crosshair; touch-action: manipulation; }
    .analysis-result { margin-top: 20px; padding: 20px; background: #eef2f5; border-radius: 10px; width: 90%; max-width: 600px; text-align: center; font-size: 18px; box-sizing: border-box; }

    /* 手機與平板直式閱讀模式 */
    @media (max-width: 850px) {
      header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
      }
      .container {
        flex-direction: column;
      }
      .left-panel {
        border-right: none;
        border-bottom: 2px dashed #eeeeee;
        padding: 20px 10px;
      }
      .right-panel {
        padding: 20px 15px;
      }
      .btn-group {
        flex-direction: column;
      }
      .mix-btn, .reset-btn {
        width: 100%;
        padding: 14px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>🎨 PCCS 24色相環 - 直覺選色實驗室</h1>
    <button class="nav-btn" onclick="toggleView()">切換至：進階相機測色解密</button>
  </header>

  <div class="container" id="main-container">
    
    <!-- 上方/左側：互動色相環 -->
    <div class="left-panel" id="basic-left">
      <h3 style="margin-top:0; color:#e74c3c; text-align:center; font-size:18px;">👆 請直接點擊下方色環選擇兩種顏色</h3>
      <div id="wheel-wrapper">
        <canvas id="wheel-canvas" width="420" height="420"></canvas>
      </div>
    </div>

    <!-- 下方/右側：控制與狀態區 -->
    <div class="right-panel" id="basic-right">
      
      <div class="selection-board">
        <div class="selection-title">目前的調色盤狀態</div>
        <div class="selected-colors-container">
          <div class="color-slot">
            <div class="color-circle" id="slot-1"></div>
            <span id="name-1" style="font-size: 14px; color: #7f8c8d;">尚未選擇</span>
          </div>
          <div class="plus-sign">+</div>
          <div class="color-slot">
            <div class="color-circle" id="slot-2"></div>
            <span id="name-2" style="font-size: 14px; color: #7f8c8d;">尚未選擇</span>
          </div>
        </div>
      </div>

      <div class="option-group">
        <label for="mode">💧 選擇水彩水分與調和比例：</label>
        <select id="mode">
          <option value="equal">等量調和 (1 : 1) - 標準色彩</option>
          <option value="heavy1">主色偏重 (2 : 1) - 傾向第一種色</option>
          <option value="watery">多水渲染 - 透明水彩淡化效果</option>
        </select>
      </div>

      <div class="btn-group">
        <button class="mix-btn" id="mix-btn" onclick="startMixing()" disabled>🚫 請先選滿兩種顏色</button>
        <button class="reset-btn" onclick="resetSelection()">🔄 重置</button>
      </div>

      <div id="result-box">
        <div id="result-text" style="font-weight: bold; font-size: 18px; color: #2980b9;"></div>
        <div id="result-swatch"></div>
        <div id="result-desc" style="font-size: 15px; color: #34495e; line-height: 1.5; padding: 0 10px;"></div>
      </div>
    </div>

    <!-- 進階視圖 -->
    <div id="advanced-view">
      <h2 style="margin-top:0; text-align:center;">🔍 現實色彩反推儀：這是怎麼調出來的？</h2>
      <p style="color: #666; margin-top:-10px; text-align:center;">開啟相機或上傳圖片，點擊畫面中的任何顏色，系統將反推 PCCS 24色相的混色配方！</p>
      <div style="margin-bottom: 15px; display:flex; flex-wrap:wrap; gap:10px; justify-content:center;">
        <button onclick="startCamera()" style="padding: 10px 15px; cursor: pointer; border-radius:8px; border:1px solid #ccc; background:#fff; font-weight:bold;">📷 開啟後置相機</button>
        <button onclick="takeSnapshot()" style="padding: 10px 15px; cursor: pointer; border-radius:8px; border:1px solid #ccc; background:#fff; font-weight:bold;">📸 拍照定格</button>
        <input type="file" id="file-input" accept="image/*" style="padding: 5px;">
      </div>
      <div class="camera-container">
        <video id="video-feed" autoplay playsinline style="display:none;"></video>
        <canvas id="photo-canvas" width="600" height="400"></canvas>
      </div>
      <div class="analysis-result" id="analysis-text">請點擊上方畫面中的任何位置進行色彩分析。</div>
    </div>
  </div>

  <script>
    const pccsColors = [
      { name: "1:pR (紫紅)", rgb: [229, 0, 79], hex: "#E5004F" },
      { name: "2:R (正紅)", rgb: [229, 0, 30], hex: "#E5001E" },
      { name: "3:yR (黃紅)", rgb: [229, 43, 0], hex: "#E52B00" },
      { name: "4:rO (紅橙)", rgb: [229, 88, 0], hex: "#E55800" },
      { name: "5:O (正橙)", rgb: [242, 120, 0], hex: "#F27800" },
      { name: "6:yO (黃橙)", rgb: [242, 155, 0], hex: "#F29B00" },
      { name: "7:rY (紅黃)", rgb: [242, 190, 0], hex: "#F2BE00" },
      { name: "8:Y (正黃)", rgb: [255, 230, 0], hex: "#FFE600" },
      { name: "9:gY (綠黃)", rgb: [204, 224, 0], hex: "#CCE000" },
      { name: "10:YG (黃綠)", rgb: [153, 209, 0], hex: "#99D100" },
      { name: "11:yG (草綠)", rgb: [102, 193, 0], hex: "#66C100" },
      { name: "12:G (正綠)", rgb: [0, 176, 79], hex: "#00B04F" },
      { name: "13:bG (藍綠)", rgb: [0, 166, 108], hex: "#00A66C" },
      { name: "14:BG (青綠)", rgb: [0, 153, 136], hex: "#009988" },
      { name: "15:gB (綠藍)", rgb: [0, 150, 170], hex: "#0096AA" },
      { name: "16:gB (天藍)", rgb: [0, 140, 200], hex: "#008CC8" },
      { name: "17:bB (紫藍)", rgb: [0, 120, 210], hex: "#0078D2" },
      { name: "18:B (正藍)", rgb: [0, 104, 183], hex: "#0068B7" },
      { name: "19:pB (紫青)", rgb: [60, 80, 185], hex: "#3C50B9" },
      { name: "20:V (正紫)", rgb: [102, 51, 184], hex: "#6633B8" },
      { name: "21:rV (紅紫)", rgb: [130, 30, 170], hex: "#821EAA" },
      { name: "22:P (濃紫)", rgb: [166, 0, 132], hex: "#A60084" },
      { name: "23:rP (艷紫)", rgb: [185, 0, 105], hex: "#B90069" },
      { name: "24:RP (紅紫)", rgb: [204, 0, 82], hex: "#CC0052" }
    ];

    const canvas = document.getElementById('wheel-canvas');
    const ctx = canvas.getContext('2d');
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const outerRadius = 180;
    const innerRadius = 70;
    
    let selectedIndices = [];

    function drawWheel() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const arcSize = (2 * Math.PI) / 24;

      pccsColors.forEach((color, i) => {
        const startAngle = (i - 7) * arcSize - arcSize / 2 - Math.PI / 2;
        const endAngle = (i - 7 + 1) * arcSize - arcSize / 2 - Math.PI / 2;
        
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        
        let currentOuterRadius = outerRadius;
        if (selectedIndices.includes(i)) {
          currentOuterRadius = outerRadius + 15;
        }

        ctx.arc(centerX, centerY, currentOuterRadius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = color.hex;
        ctx.fill();
        
        ctx.strokeStyle = selectedIndices.includes(i) ? "#2c3e50" : "#ffffff";
        ctx.lineWidth = selectedIndices.includes(i) ? 3 : 1.5;
        ctx.stroke();
      });

      ctx.beginPath();
      ctx.arc(centerX, centerY, innerRadius, 0, 2 * Math.PI);
      ctx.fillStyle = "#ffffff";
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.stroke();
      
      ctx.fillStyle = "#95a5a6";
      ctx.font = "14px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("點擊外圈", centerX, centerY - 8);
      ctx.fillText("選擇顏色", centerX, centerY + 12);
    }

    drawWheel();

    canvas.addEventListener('click', function(event) {
      if (document.getElementById('wheel-wrapper').classList.contains('spinning')) return;

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      
      const x = (event.clientX - rect.left) * scaleX - centerX;
      const y = (event.clientY - rect.top) * scaleY - centerY;
      
      const distance = Math.sqrt(x * x + y * y);
      
      if (distance >= innerRadius && distance <= outerRadius + 15) {
        let angle = Math.atan2(y, x) + Math.PI / 2;
        if (angle < 0) angle += 2 * Math.PI;
        
        const segmentAngle = (2 * Math.PI) / 24;
        let index = (Math.round(angle / segmentAngle) + 7) % 24;
        
        handleColorSelection(index);
      }
    });

    function handleColorSelection(index) {
      document.getElementById('result-box').style.display = 'none';

      const existPos = selectedIndices.indexOf(index);
      
      if (existPos !== -1) {
        selectedIndices.splice(existPos, 1);
      } else {
        if (selectedIndices.length < 2) {
          selectedIndices.push(index);
        } else {
          selectedIndices.shift();
          selectedIndices.push(index);
        }
      }

      updateSelectionUI();
      drawWheel();
    }

    function updateSelectionUI() {
      const slot1 = document.getElementById('slot-1');
      const name1 = document.getElementById('name-1');
      const slot2 = document.getElementById('slot-2');
      const name2 = document.getElementById('name-2');
      const mixBtn = document.getElementById('mix-btn');

      if (selectedIndices.length >= 1) {
        const c1 = pccsColors[selectedIndices[0]];
        slot1.style.backgroundColor = c1.hex;
        slot1.classList.add('filled');
        name1.innerText = c1.name;
        name1.style.color = "#2c3e50";
        name1.style.fontWeight = "bold";
      } else {
        slot1.style.backgroundColor = "transparent";
        slot1.classList.remove('filled');
        name1.innerText = "尚未選擇";
        name1.style.color = "#7f8c8d";
        name1.style.fontWeight = "normal";
      }

      if (selectedIndices.length === 2) {
        const c2 = pccsColors[selectedIndices[1]];
        slot2.style.backgroundColor = c2.hex;
        slot2.classList.add('filled');
        name2.innerText = c2.name;
        name2.style.color = "#2c3e50";
        name2.style.fontWeight = "bold";
        
        mixBtn.disabled = false;
        mixBtn.innerText = "🌀 開始旋轉混色！";
        mixBtn.style.animation = "pulse 1.5s infinite";
      } else {
        slot2.style.backgroundColor = "transparent";
        slot2.classList.remove('filled');
        name2.innerText = "尚未選擇";
        name2.style.color = "#7f8c8d";
        name2.style.fontWeight = "normal";
        
        mixBtn.disabled = true;
        mixBtn.innerText = "🚫 請先選滿兩種顏色";
        mixBtn.style.animation = "none";
      }
    }

    function resetSelection() {
      selectedIndices = [];
      updateSelectionUI();
      drawWheel();
      document.getElementById('result-box').style.display = 'none';
    }

    function startMixing() {
      if (selectedIndices.length !== 2) return;

      const wrapper = document.getElementById('wheel-wrapper');
      wrapper.classList.add('spinning');
      document.getElementById('result-box').style.display = 'none';

      setTimeout(() => {
        wrapper.classList.remove('spinning');
        showResult();
      }, 1500);
    }

    function showResult() {
      const idx1 = selectedIndices[0];
      const idx2 = selectedIndices[1];
      const mode = document.getElementById('mode').value;

      const col1 = pccsColors[idx1].rgb;
      const col2 = pccsColors[idx2].rgb;

      let r, g, b;
      if (mode === 'equal') {
        r = Math.round((col1[0] + col2[0]) / 2);
        g = Math.round((col1[1] + col2[1]) / 2);
        b = Math.round((col1[2] + col2[2]) / 2);
      } else if (mode === 'heavy1') {
        r = Math.round((col1[0] * 2 + col2[0]) / 3);
        g = Math.round((col1[1] * 2 + col2[1]) / 3);
        b = Math.round((col1[2] * 2 + col2[2]) / 3);
      } else { 
        r = Math.round((col1[0] + col2[0] + 255 * 2) / 4);
        g = Math.round((col1[1] + col2[1] + 255 * 2) / 4);
        b = Math.round((col1[2] + col2[2] + 255 * 2) / 4);
      }

      const resHex = `rgb(${r}, ${g}, ${b})`;
      document.getElementById('result-swatch').style.backgroundColor = resHex;
      
      const n1 = pccsColors[idx1].name.split(' ')[0];
      const n2 = pccsColors[idx2].name.split(' ')[0];
      document.getElementById('result-text').innerText = `混色配方：${n1} + ${n2}`;
      
      const diff = Math.min(Math.abs(idx1 - idx2), 24 - Math.abs(idx1 - idx2));
      let relation = "這兩種顏色混合產生了豐富的水彩層次，你可以試著在畫紙上重現它！";
      
      if (diff === 12) {
        relation = "🌟 這是 PCCS 系統中的「互補色」混合！(在 24 色相環上成 180 度對立，如 2:R 與 14:BG，或 8:Y 與 20:V)。\n互補色相混會互相抵消彩度，調出沉穩的灰色或深暗褐色，是畫陰影和暗部的絕佳配方！";
      } else if (diff <= 2) {
        relation = "🎨 這是「類似色/鄰近色」混合！(在色相環上極為靠近)。\n顏色過渡非常協調自然，混色過程不易變髒，非常適合表現光影的平滑漸層。";
      } else if (diff === 8) {
         relation = "📐 這是「對比色/三角調和」混合！(在 24 色相環上呈 120 度等邊三角形)。\n色彩對比強烈且富有節奏感，混合後會產生視覺衝擊力較強的中間調色彩。";
      } else if (diff >= 5 && diff <= 10) {
         relation = "⚡ 這組屬於「色相反差較大」的對比關係。\n因為色相距離較遠，混色時會大幅降低彼此的彩度，容易產生帶有濁感、富有沉穩氣質的復古中間調。";
      }
      
      document.getElementById('result-desc').innerText = relation;
      document.getElementById('result-box').style.display = 'block';
      
      document.getElementById('result-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(230, 126, 34, 0.7); }
        70% { box-shadow: 0 0 0 15px rgba(230, 126, 34, 0); }
        100% { box-shadow: 0 0 0 0 rgba(230, 126, 34, 0); }
      }
    `;
    document.head.appendChild(style);

    let isAdvanced = false;
    function toggleView() {
      isAdvanced = !isAdvanced;
      document.getElementById('basic-left').style.display = isAdvanced ? 'none' : 'flex';
      document.getElementById('basic-right').style.display = isAdvanced ? 'none' : 'flex';
      document.getElementById('advanced-view').style.display = isAdvanced ? 'flex' : 'none';
      document.querySelector('.nav-btn').innerText = isAdvanced ? '返回：基礎混色實驗室' : '切換至：進階相機測色解密';
    }

    const video = document.getElementById('video-feed');
    const photoCanvas = document.getElementById('photo-canvas');
    const photoCtx = photoCanvas.getContext('2d');

    photoCtx.fillStyle = "#333";
    photoCtx.fillRect(0, 0, photoCanvas.width, photoCanvas.height);
    photoCtx.fillStyle = "#fff";
    photoCtx.font = "20px sans-serif";
    photoCtx.fillText("請點擊上方按鈕開啟相機或上傳照片", 130, 200);

    // 🔥 升級：強制調用手機後置相機 (environment)，若不支援則優雅降級為一般鏡頭 🔥
    function startCamera() {
      video.style.display = 'block';
      photoCanvas.style.display = 'none';
      
      navigator.mediaDevices.getUserMedia({ 
        video: { 
          facingMode: { ideal: "environment" } // 指定手機後置鏡頭
        } 
      })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { 
          // 萬一裝置不支援 facingMode，降級要求任何可用鏡頭
          navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(e => { alert("無法開啟相機，請確認瀏覽器的「相機權限」是否有開啟，或直接使用旁邊的圖片上傳功能！"); });
        });
    }

    function takeSnapshot() {
      if (video.style.display !== 'none') {
        photoCanvas.style.display = 'block';
        photoCtx.drawImage(video, 0, 0, photoCanvas.width, photoCanvas.height);
        video.style.display = 'none';
        const stream = video.srcObject;
        if (stream) stream.getTracks().forEach(track => track.stop());
      }
    }

    document.getElementById('file-input').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          const img = new Image();
          img.onload = function() {
            photoCanvas.style.display = 'block';
            video.style.display = 'none';
            const ratio = Math.min(photoCanvas.width / img.width, photoCanvas.height / img.height);
            const w = img.width * ratio;
            const h = img.height * ratio;
            const x = (photoCanvas.width - w) / 2;
            const y = (photoCanvas.height - h) / 2;
            photoCtx.clearRect(0,0,photoCanvas.width,photoCanvas.height);
            photoCtx.drawImage(img, x, y, w, h);
          }
          img.src = event.target.result;
        }
        reader.readAsDataURL(file);
      }
    });

    photoCanvas.addEventListener('click', function(e) {
      if (!isAdvanced) return;
      const rect = photoCanvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (photoCanvas.width / rect.width);
      const y = (e.clientY - rect.top) * (photoCanvas.height / rect.height);
      const pixel = photoCtx.getImageData(x, y, 1, 1).data;
      analyzePixelColor(pixel[0], pixel[1], pixel[2]);
    });

    function analyzePixelColor(r, g, b) {
      let bestMatch = "";
      let minDistance = Infinity;

      for (let i = 0; i < pccsColors.length; i++) {
        for (let j = i; j < pccsColors.length; j++) {
          const c1 = pccsColors[i].rgb;
          const c2 = pccsColors[j].rgb;
          const mixR = (c1[0] + c2[0]) / 2;
          const mixG = (c1[1] + c2[1]) / 2;
          const mixB = (c1[2] + c2[2]) / 2;

          const dist = Math.sqrt(Math.pow(r - mixR, 2) + Math.pow(g - mixG, 2) + Math.pow(b - mixB, 2));
          if (dist < minDistance) {
            minDistance = dist;
            if (i === j) {
              bestMatch = `極度接近 PCCS 色相環中的 **${pccsColors[i].name}**！`;
            } else {
              bestMatch = `這可以嘗試用 **${pccsColors[i].name.split(' ')[0]}** 與 **${pccsColors[j].name.split(' ')[0]}** 約 1:1 調配出來！`;
            }
          }
        }
      }
      
      document.getElementById('analysis-text').innerHTML = 
        `<div style="display:inline-block;width:30px;height:30px;background:rgb(${r},${g},${b});vertical-align:middle;border:2px solid #ccc;border-radius:5px;margin-right:15px;box-shadow:0 2px 5px rgba(0,0,0,0.2);"></div>` +
        `<span style="color:#2c3e50;font-size:20px;">💡 ${bestMatch}</span>`;
    }
  </script>
</body>
</html>
